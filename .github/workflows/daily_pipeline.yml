name: Daily Steam Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip uninstall -y numpy pandas || true
          python -m pip install --no-cache-dir --force-reinstall "numpy==1.26.4" "pandas==2.2.2"
          python -m pip install --no-cache-dir -r src/requirements.txt
          python - <<'PY'
          import numpy, pandas
          print("numpy", numpy.__version__)
          print("pandas", pandas.__version__)
          PY

      - name: Run pipeline
        run: python src/run_pipeline.py --config config.github.json
